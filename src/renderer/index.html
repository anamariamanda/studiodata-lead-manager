<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudioData Lead Manager</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <img class="brand-logo" src="./assets/studiodata-logo.svg" alt="StudioData">
        <div>
          <span>Lead Manager</span>
        </div>
      </div>
      <nav>
        <button data-page="dashboard" class="active"><span>⌘</span>Dashboard</button>
        <button data-page="leads"><span>☰</span>Lead-uri</button>
        <button data-page="importContacts"><span>⇩</span>Import contacte</button>
        <button data-page="offers"><span>▤</span>Oferte</button>
        <button data-page="studioProfile"><span>◆</span>Profil StudioData</button>
        <button data-page="scraper"><span>◎</span>Auditor website</button>
        <button data-page="add"><span>＋</span>Adaugă lead</button>
        <button data-page="templates"><span>✎</span>Șabloane</button>
        <button data-page="followups"><span>◷</span>Follow-up</button>
        <button data-page="backup"><span>⇅</span>Backup</button>
        <button data-page="settings"><span>⚙</span>Setări</button>
        <button data-page="help"><span>?</span>Ajutor</button>
      </nav>
    </aside>
    <main>
      <header class="topbar">
        <div>
          <h1 id="page-title">Dashboard</h1>
          <p id="page-subtitle">Privire rapidă asupra lead-urilor și follow-up-urilor.</p>
        </div>
        <div class="top-actions">
          <button class="secondary" id="back-btn" disabled>Înapoi</button>
          <button class="secondary" id="refresh-btn">Reîncarcă</button>
          <button class="primary" data-page-jump="add">Adaugă lead</button>
        </div>
      </header>
      <section id="notice" class="notice hidden"></section>
      <section id="app"></section>
    </main>
    <div id="toast" class="toast hidden"></div>
    <script src="./app.js"></script>
  </body>
</html>
